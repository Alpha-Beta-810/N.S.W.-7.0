{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-2">
  <div class="col-md-5 col-lg-4">
    <div class="section-card">
      <div class="section-title text-center py-2">
        <i class="bi bi-person-lock me-2"></i>Admin Login
      </div>
      <div class="section-body p-4">
        <p class="text-muted small text-center mb-3">Restricted to SPARK administrators only.</p>
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" autofocus autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <input type="password" id="pwField" name="password" class="form-control" autocomplete="current-password">
              <button type="button" class="btn btn-outline-secondary" onclick="togglePw()">
                <i class="bi bi-eye" id="pwEye"></i>
              </button>
            </div>
          </div>
          {% if error %}
          <div class="alert alert-danger py-2 small">{{ error }}</div>
          {% endif %}
          <button type="submit" class="btn btn-warning w-100 fw-semibold">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block extra_js %}
<script>
  function togglePw() {
    const f = document.getElementById('pwField');
    const e = document.getElementById('pwEye');
    f.type = f.type === 'password' ? 'text' : 'password';
    e.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  }
</script>
{% endblock %}
