{% extends "base.html" %}
{% block content %}

<h3 style="color:#003366;font-weight:700;">Forms &amp; Downloads</h3>
<hr>

<div class="row g-3">
    {% for f in downloads %}
    <div class="col-md-6">
        <div class="section-card h-100">
            <div class="section-body d-flex align-items-center justify-content-between gap-3">
                <div>
                    <i class="bi bi-file-earmark-pdf text-danger fs-3 float-start me-3"></i>
                    <strong class="d-block">{{ f.name }}</strong>
                    <small class="text-muted">{{ f.desc }}</small>
                </div>
                <a href="{{ f.url }}" target="_blank"
                   class="btn btn-sm btn-outline-secondary flex-shrink-0">
                    <i class="bi bi-download me-1"></i>Download
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
